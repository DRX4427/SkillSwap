<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SkillSwap - Accueil</title>
</head>
<body style="font-family: sans-serif; padding: 50px; background-color: #f4f4f4;">

    <div th:if="${success}" style="background-color: #2ecc71; color: white; padding: 15px; border-radius: 5px; text-align: center; margin-bottom: 20px;">
        <p th:text="${success}"></p>
    </div>

    <div th:if="${session.utilisateurConnecte != null}" style="background-color: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h1 style="color: #2c3e50;">Bravo ! Vous êtes connecté.</h1>
        
        <p>Bienvenue dans ton espace, <strong th:text="${session.utilisateurConnecte.nom}">Utilisateur</strong> !</p>
        
        <p>Email : <span th:text="${session.utilisateurConnecte.email}">email@test.com</span></p>
        <p>Ton rôle : <span style="background-color: #3498db; color: white; padding: 2px 8px; border-radius: 3px;" th:text="${session.utilisateurConnecte.role}">ROLE</span></p>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        
        <a th:href="@{/}" style="color: #e74c3c; text-decoration: none; font-weight: bold;">Se déconnecter</a>
    </div>

</body>
</html>
